name: AIOS Quality Gate

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Ruff, Mypy, Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy
        run: python -m mypy

      - name: Regression tests
        run: python -m pytest -q -m "not e2e" --cov=api --cov=agentic --cov=security --cov-report=term-missing

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-results
          path: |
            .coverage
            quality-gate-results.json
          if-no-files-found: ignore

  browser-smoke:
    name: Playwright Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: python -m pytest -q -m e2e

  release-gate:
    name: Release Gate
    if: always()
    needs: [backend-quality, browser-smoke]
    runs-on: ubuntu-latest

    steps:
      - name: Enforce successful gates
        run: |
          test "${{ needs.backend-quality.result }}" = "success"
          test "${{ needs.browser-smoke.result }}" = "success"
